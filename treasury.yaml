# NULL token treasury — public ledger of how the coin funds the project.
#
# This file is the canonical, source-of-truth declaration of the wallet
# the project uses to receive pump.fun creator-rewards on the $NULL
# token, and the policy under which those funds are spent.
#
# Everything here is meant to be auditable. Anyone can:
#   1. Read this file
#   2. Look up the wallet address on Solscan / any Solana explorer
#   3. Cross-reference inflows against pump.fun creator-rewards records
#   4. Cross-reference outflows against benchmark runs in this repo
#      (samples/daemon_runs/<date>/) and the public dashboard
#
# This is the trust model. There is no separate "team wallet" or hidden
# treasury. If it isn't in this file, it isn't part of the project's
# economics.

token:
  name: NULL
  network: solana
  launchpad: pump.fun
  # Public token mint address. Verifiable on Solana explorers and
  # pump.fun. The "pump" suffix is standard for pump.fun mints.
  mint: "DKr4zK3gQLPAx1CkjhTpw3qSxEv265LrZWcxpKG9pump"
  # Pump.fun page for the token (price, holders, trade history).
  pump_url: "https://pump.fun/coin/DKr4zK3gQLPAx1CkjhTpw3qSxEv265LrZWcxpKG9pump"
  # Solscan link for the token mint, for auditing supply / holders / transfers.
  explorer_url: "https://solscan.io/token/DKr4zK3gQLPAx1CkjhTpw3qSxEv265LrZWcxpKG9pump"
  # The official $NULL is THIS mint. Any other "NULL" token on Solana
  # is unaffiliated with this project. Always verify the mint string
  # before trading.
  notice: "the only official $NULL token mint is the one above. always verify."

treasury:
  # Public wallet address that receives pump.fun creator-rewards on the
  # NULL token. This is the only wallet the project draws from.
  # Read-only here — the private key lives in the maintainer's secured
  # wallet (multisig recommended once balance is non-trivial).
  wallet: "84oKWWvA9ths3VZ8BTpynFaDZv7SFmq1omNpH7XTNULL"
  # Solscan link for the wallet, for auditing inflows and outflows.
  explorer_url: "https://solscan.io/account/84oKWWvA9ths3VZ8BTpynFaDZv7SFmq1omNpH7XTNULL"
  # Network where the wallet lives.
  network: solana

# How treasury funds become API spend.
#
# Until automated fiat off-ramp (Helio / Coinflow) is wired up, the
# loop has one manual step: the maintainer cashes out treasury balance
# periodically and tops up the project's API account at the relevant
# provider (Anthropic / OpenAI / etc). The daemon then spends those
# credits on scheduled benchmark + train cycles, halts when the budget
# cap is hit, and resumes after the next top-up.
funding_loop:
  - step: "pump.fun creator-rewards land in treasury wallet (automatic, ongoing)"
  - step: "maintainer cashes out periodically — SOL or USDC -> fiat or virtual card (manual, ~weekly)"
  - step: "fiat tops up API account credit balance at provider (manual)"
  - step: "null daemon spends API credits on scheduled cycles within --budget-usd cap (automatic)"
  - step: "results auto-committed to samples/daemon_runs/<date>/ in this repo (automatic)"

# Daemon configuration the maintainer runs against the funded API
# account. These values are publishable; the API key itself is not.
daemon:
  # Models the daemon rotates through. Add new ones as cross-vendor
  # coverage expands.
  rotation:
    - "anthropic:claude-haiku-4-5-20251001"
    - "anthropic:claude-sonnet-4-6"
  # Scenario pool. Empty list = the canonical curriculum.
  scenarios: []
  # Hard cap per top-up cycle. The maintainer sets this to roughly the
  # current API account balance. Daemon halts when reached.
  budget_usd_per_topup: 5.00
  # Time between training ticks. 1800s = 30 min. Lower = more cycles
  # per dollar but more cost; higher = slower but more sustainable.
  interval_seconds: 1800
  # Cycles per (target, scenario) pick.
  cycles_per_run: 3
  # Auto-commit each run's results to the repo.
  auto_commit: true
  # Auto-push requires git credentials configured for non-interactive
  # use. Recommended setup: SSH key + ssh-agent. Not enabled by
  # default to avoid surprise push failures from credential helpers.
  auto_push: false

# What the project commits to with these funds.
#
# In rough order of priority — the daemon is configured to chase items
# higher on this list when it has budget to spend.
priorities:
  - "cross-vendor benchmark coverage (OpenAI, Mistral, Llama via OpenRouter)"
  - "standard-benchmark integration (IFEval, BFCL)"
  - "replication runs (3+ runs per cell with mean and std)"
  - "scenarios that actually exercise retrieval lift"
  - "cross-vendor semantic judge runs (judge != target family)"
  - "fixing the storage gaps surfaced in BENCHMARKS.md (per-axis persistence, semantic judge null)"

# What the project does NOT do with these funds.
not_funded:
  - "team salaries (this is a side project; no payroll)"
  - "marketing / paid promotion of the token"
  - "buybacks of the token from market makers (the project doesn't trade its own coin)"
  - "private benchmarks held back from the repo (every run goes to git)"
